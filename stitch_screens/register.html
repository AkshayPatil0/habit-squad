<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5a5af6",
                        "background-light": "#f5f5f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .neo-blob {
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Decorative Blobs -->
<div class="fixed top-[-10%] left-[-10%] w-64 h-64 bg-primary/10 neo-blob -z-10"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-80 h-80 bg-primary/5 neo-blob -z-10"></div>
<div class="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-primary/10">
<!-- Top App Bar Style Header -->
<div class="flex items-center bg-white dark:bg-slate-900 p-6 pb-2 justify-between">
<div class="text-primary flex size-10 shrink-0 items-center justify-center bg-primary/10 rounded-full cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight flex-1 ml-4">Sign Up</h2>
</div>
<div class="p-6 pt-2">
<!-- Illustration Placeholder -->
<div class="relative w-full aspect-video rounded-xl overflow-hidden mb-6 bg-gradient-to-br from-primary/20 to-primary/5 border-2 border-dashed border-primary/20 flex items-center justify-center">
<div class="text-center">
<div class="w-24 h-24 bg-primary rounded-full mx-auto mb-2 flex items-center justify-center text-white shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-5xl">emoji_people</span>
</div>
<p class="text-primary font-bold text-sm">Welcome to the Squad!</p>
</div>
<!-- Abstract Image Tag -->
<div class="absolute inset-0 opacity-10 pointer-events-none" data-alt="Playful illustration of a waving character character" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAuszUPRgDa2tCJzfGochv_DVI6vLj84svl77NfIPuvWj67BG8E58_arIyV8G95xMWGS1p08jYxdUdovq5k9iFjwP9tty-_O-ud3m94dsHKlsHxwCHxpEmumGlNuP64Q1nSwDg71BWHDB5K64E4-SD_ml2ZrXWbESQ-LnS8lWHbMFuKIhbPYdGoset7VaysfcvnlCC52jXoBX1MQ-g7Fvn8FBaWCGupPXJDxona9H9vyij902tXIVBTf5FwX1u8CCCkdTHZFSB9oko');"></div>
</div>
<h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight mb-6">Join the Habit Squad</h1>
<!-- Form -->
<form class="space-y-4">
<div class="flex flex-col">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1 ml-1">Full Name</p>
<div class="relative">
<input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 h-14 px-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="Alex Cooper" type="text"/>
</div>
</div>
<div class="flex flex-col">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1 ml-1">Email</p>
<div class="relative">
<input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 h-14 px-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="alex@habit.com" type="email"/>
</div>
</div>
<div class="flex flex-col">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1 ml-1">Password</p>
<div class="relative">
<input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 h-14 px-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer">visibility</span>
</div>
</div>
<!-- Checkbox -->
<div class="flex items-start gap-3 py-2 px-1">
<input class="mt-1 size-5 rounded-md border-slate-300 text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 leading-tight" for="terms">
                        I agree to the <a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<!-- Primary CTA -->
<button class="w-full h-14 rounded-xl bg-gradient-to-r from-primary to-[#7c7cf8] text-white font-bold text-lg shadow-xl shadow-primary/25 hover:scale-[1.02] active:scale-[0.98] transition-all" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></div>
<span class="text-slate-400 text-xs font-bold uppercase tracking-widest">or sign up with</span>
<div class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-14 rounded-xl border-2 border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<img alt="Google" class="size-6" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCiB379JVBRUBnyMxOOyXo-CUqIEPo_ISVusNa2LZVCNcNqMa8PNFKFy2p-pcLwB5XgyOnfbC_PzWiykjoYkiWm3leHTetgJik1MHjQwD0Mqg43L_JfC0-gT3QiJnpZBtzkVmDlUBUs8BOGm29Uz2MzeSGbcu4daNQkSAydkqrNGrciIPRMkSEQx6yzWln62kfUAo_2nYuHcuSPSxMgf7BYGls17DYeXAGUBZQwn1Ly-mvZ7azGFzdndyli-pyd52KFWLsIVOByte4"/>
<span class="font-bold text-slate-700 dark:text-slate-300">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-14 rounded-xl border-2 border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-white text-2xl">ios</span>
<span class="font-bold text-slate-700 dark:text-slate-300">Apple</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center mt-8 pb-4">
<p class="text-slate-600 dark:text-slate-400">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Log In</a>
</p>
</div>
</div>
</div>
</body></html>
