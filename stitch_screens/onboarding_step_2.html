<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Step 2 - Habit Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5a5af6",
                        "background-light": "#f5f5f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-transparent p-4 justify-end">
<button class="flex items-center justify-end px-4 py-2 hover:bg-primary/10 rounded-full transition-colors">
<p class="text-primary text-base font-bold leading-normal tracking-tight">Skip</p>
</button>
</div>
<!-- Illustration Area -->
<div class="flex w-full grow items-center justify-center p-8">
<div class="relative w-full aspect-square max-w-[320px]">
<!-- Playful Neo-illustrative Shape Background -->
<div class="absolute inset-0 bg-primary/10 rounded-xl rotate-3"></div>
<div class="absolute inset-0 bg-gradient-to-br from-primary/30 to-primary/5 rounded-xl -rotate-3"></div>
<!-- Main Illustration Placeholder -->
<div class="relative w-full h-full rounded-xl overflow-hidden flex items-center justify-center bg-white dark:bg-slate-800 shadow-xl border-4 border-white dark:border-slate-700">
<div class="w-full h-full bg-cover bg-center" data-alt="Playful character checking off items on a giant colorful habit calendar" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB9NEbDB6p66xYSmzxqKeym5biJWHdAgq2bcKEnhYtfiCYALBHQdboF1t1TughWUp8cb0wo2_KwAjr68nmlbedz0acyHPD_OaE1OQUtHwIWPTN3cj5yBJoZBAfXGK5VrKolCgybgr5grdiTRtYwPX8ppSVHvj8V0EGigLxhZp_4UsukJjhrX_gHhq-ZR_ljeLWCXZUhxtsanbZ5ZAtfZJ007LWYVlu2GnHC4RjG6gJpwWNysXMZ6lWS_pB0r4Iaj2-wgU0RoBLeeWE");'>
</div>
<!-- Floating Neo-illustrative elements -->
<div class="absolute top-4 right-4 bg-yellow-400 p-2 rounded-lg shadow-lg -rotate-12">
<span class="material-symbols-outlined text-white text-2xl">star</span>
</div>
<div class="absolute bottom-8 left-4 bg-primary p-2 rounded-lg shadow-lg rotate-6">
<span class="material-symbols-outlined text-white text-2xl">check_circle</span>
</div>
</div>
</div>
</div>
<!-- Content Area -->
<div class="flex flex-col items-center px-8 pb-12 pt-6 bg-white dark:bg-slate-900 rounded-t-xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
<h1 class="text-slate-900 dark:text-white tracking-tight text-3xl font-bold leading-tight text-center pb-3 pt-4">
                Track habits daily
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-normal leading-relaxed text-center pb-8">
                Daily, weekly, or custom goals tailored to your lifestyle.
            </p>
<!-- Stepper Indicators -->
<div class="flex flex-row items-center justify-center gap-3 py-6">
<div class="h-2.5 w-2.5 rounded-full bg-primary/20"></div>
<div class="h-2.5 w-8 rounded-full bg-primary shadow-sm shadow-primary/40"></div>
<div class="h-2.5 w-2.5 rounded-full bg-primary/20"></div>
</div>
<!-- CTA Button -->
<div class="w-full pt-6">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 px-8 rounded-xl shadow-lg shadow-primary/25 flex items-center justify-center gap-2 group transition-all">
<span>Continue</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Safe Area Spacer -->
<div class="h-6"></div>
</div>
</div>
