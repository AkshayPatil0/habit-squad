<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5a5af6",
              "background-light": "#f5f5f8",
              "background-dark": "#101022",
            },
            fontFamily: {
              "display": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Habit Tracker Onboarding</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Header / Skip Action -->
<div class="flex items-center p-6 pb-2 justify-end">
<div class="flex w-12 items-center justify-end">
<p class="text-primary font-bold text-base leading-normal tracking-[0.015em] cursor-pointer">Skip</p>
</div>
</div>
<!-- Main Illustration Container -->
<div class="flex w-full grow @container px-6 py-4">
<div class="w-full h-full relative overflow-hidden bg-primary/5 dark:bg-primary/10 rounded-xl flex items-center justify-center border-2 border-primary/10">
<!-- Neo-illustrative Style Placeholder -->
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Neo-illustrative podium with characters holding trophies and gold coins" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD9JpyXuok--ZYTP9eI9hODINQ5HO24G5bYJwhrFcj_SkOnyP0IsVFjHcQj1d1LTVeobrGNsjVlwCKJS4-ncbHtWXvVcI2Q6Ltu0RC-C4oSii99gQnQgEsjd5DI_E6oDxoPheAXOQqgIRRUeq2ruCM-Wh0FpAiUGC42ok8axp8YedIjAlFthPeCgqgd9FSI6UESLz4-A3JQKlOwFDT93PLa0JJK5I_6wqv7AtT7wVF63WDSXS2qGitlT-9RXw8gqJ3PfCJN3cWjkYA");'>
</div>
<!-- Floating Decorative Elements (Icons) -->
<div class="absolute top-8 left-8 text-primary/40">
<span class="material-symbols-outlined text-5xl">military_tech</span>
</div>
<div class="absolute bottom-12 right-12 text-primary/40 rotate-12">
<span class="material-symbols-outlined text-4xl">payments</span>
</div>
</div>
</div>
<!-- Content Section -->
<div class="px-8 flex flex-col items-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-center pb-3 pt-6">
                Compete and win rewards
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-6 text-center max-w-[280px]">
                Earn XP, coins, and unlock achievements with your team.
            </p>
<!-- Pagination Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-6">
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-6 rounded-full bg-primary"></div>
</div>
<!-- Action Button -->
<div class="w-full pb-12 pt-4">
<button class="w-full py-4 px-6 rounded-full bg-gradient-to-r from-primary to-[#8b5cf6] text-white font-bold text-lg shadow-lg shadow-primary/30 active:scale-[0.98] transition-transform">
                    Create Account
                </button>
<div class="mt-4 flex items-center justify-center gap-2">
<span class="text-slate-500 dark:text-slate-400 text-sm">Already have an account?</span>
<span class="text-primary font-bold text-sm">Log In</span>
</div>
</div>
</div>
</div>
</body></html>
